<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINEVERSE - Beta Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .font-pro { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        
        /* Barre latérale */
        .sidebar-btn { transition: 0.3s; border-radius: 12px; color: #888; text-align: left; padding: 1rem; font-weight: bold; display: flex; align-items: center; gap: 0.75rem; width: 100%; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        
        /* Outil Actif */
        .sidebar-btn.active { background: #00ff00; color: #000; box-shadow: 0 0 25px rgba(0,255,0,0.4); cursor: pointer; }
        
        /* Outils Grisés (Désactivés) */
        .sidebar-btn.disabled { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; pointer-events: none; border: 1px dashed rgba(255,255,255,0.1); }
        
        .lock-icon { margin-left: auto; font-size: 10px; opacity: 0.5; }

        /* Animation */
        .page { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Inputs */
        input { border: 1px solid rgba(255,255,255,0.1) !important; transition: 0.3s; color: white !important; background: rgba(255,255,255,0.03); }
        input:focus { border-color: #00ff00 !important; background: rgba(0, 255, 0, 0.05) !important; outline: none; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <!-- NAVIGATION (BETA MODE) -->
    <nav class="w-full lg:w-72 glass m-2 p-6 flex flex-col gap-4 z-50 border-r border-green-600/10">
        <div class="text-3xl font-black italic tracking-tighter text-center uppercase font-pro mb-6 text-white">
            MINE<span class="text-green-500">VERSE</span>
            <span class="block text-[9px] not-italic tracking-[4px] text-green-500 mt-1 opacity-70">Beta</span>
        </div>
        
        <div class="flex flex-col gap-2">
            <!-- SEUL OUTIL DISPONIBLE -->
            <button class="sidebar-btn active">🎯 Stratégie & Audit</button>

            <!-- OUTILS GRISÉS -->
            <button class="sidebar-btn disabled">💬 Comment Forge <span class="lock-icon">🔒</span></button>
            <button class="sidebar-btn disabled">📺 Analyseur Chaîne <span class="lock-icon">🔒</span></button>
            <button class="sidebar-btn disabled">📊 Performance Vidéo <span class="lock-icon">🔒</span></button>
            <button class="sidebar-btn disabled">🖼️ Mockup Miniature <span class="lock-icon">🔒</span></button>
            <button class="sidebar-btn disabled">🔍 Spy SEO <span class="lock-icon">🔒</span></button>
            <button class="sidebar-btn disabled">✍️ Score Titre <span class="lock-icon">🔒</span></button>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5 text-center">
            <div class="bg-green-500/10 p-4 rounded-xl">
                <p class="text-[10px] uppercase font-bold text-green-500 tracking-widest">Version Limitée</p>
                <p class="text-[9px] text-gray-500 mt-1">beta prout.</p>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-4 lg:p-10">

        <!-- UNIQUE PAGE ACTIVE : STRATEGIE -->
        <section id="page-strategy" class="page space-y-8">
            <div class="flex items-center gap-4">
                <h1 class="text-4xl font-black font-pro italic uppercase">Audit <span class="text-green-500">Stratégique</span></h1>
                <span class="px-3 py-1 bg-green-500/20 text-green-500 text-[10px] font-bold rounded-full uppercase tracking-widest border border-green-500/30">Outil Actif</span>
            </div>
            
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                <!-- FORMULAIRE -->
                <div class="glass p-8 space-y-6 border-l-4 border-green-500">
                    <h3 class="text-xs font-bold uppercase text-gray-400 tracking-widest">Analyse de Rétention</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Durée Vidéo (ex: 10:00)</label>
                            <input type="text" id="stratDuration" placeholder="MM:SS" class="w-full p-4 rounded-xl outline-none font-bold text-lg">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Watch Time Moyen (ex: 04:30)</label>
                            <input type="text" id="stratAVD" placeholder="MM:SS" class="w-full p-4 rounded-xl outline-none font-bold text-lg">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Taux de clic (CTR %)</label>
                            <input type="number" id="stratCTR" placeholder="ex: 6.5" class="w-full p-4 rounded-xl outline-none font-bold text-lg">
                        </div>
                    </div>
                    <button onclick="calculateStrategy()" class="w-full bg-green-500 text-black py-5 rounded-2xl font-black uppercase italic hover:bg-green-400 transition shadow-lg shadow-green-500/20">Lancer l'audit bêta</button>
                </div>

                <!-- RESULTATS -->
                <div id="stratResult" class="hidden glass p-8 space-y-6 border-t-4 border-green-500">
                    <div class="flex justify-between items-end border-b border-white/10 pb-6">
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Rétention Totale</p>
                            <p id="resRetention" class="text-6xl font-black font-pro text-green-500">0%</p>
                        </div>
                        <div class="text-right">
                            <p id="resStatus" class="text-[10px] font-black uppercase bg-green-500 text-black px-4 py-1.5 rounded-full inline-block">--</p>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="bg-white/5 p-5 rounded-2xl border border-white/5">
                            <h4 class="text-green-500 font-bold text-[10px] uppercase tracking-widest mb-2">Diagnostic Algorithmique</h4>
                            <p id="resDiagnostic" class="text-sm text-gray-300 leading-relaxed italic">--</p>
                        </div>
                        <div class="bg-green-500/10 p-5 rounded-2xl border border-green-500/20">
                            <h4 class="text-green-500 font-bold text-[10px] uppercase tracking-widest mb-1">Recommandation</h4>
                            <p id="resAction" class="text-white text-base font-black uppercase leading-tight">--</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').reverse();
            let secs = 0;
            if(parts[0]) secs += parseInt(parts[0]);
            if(parts[1]) secs += parseInt(parts[1]) * 60;
            return secs;
        }

        function calculateStrategy() {
            const duration = timeToSeconds(document.getElementById('stratDuration').value);
            const avd = timeToSeconds(document.getElementById('stratAVD').value);
            const ctr = parseFloat(document.getElementById('stratCTR').value);
            
            if(!duration || !avd || isNaN(ctr)) return alert("Veuillez entrer les données au format MM:SS");

            const retention = Math.round((avd / duration) * 100);
            const resDiv = document.getElementById('stratResult');
            resDiv.classList.remove('hidden');
            document.getElementById('resRetention').innerText = retention + "%";

            let diag = "";
            let act = "";
            let stat = "";

            if (ctr < 4 && retention < 35) {
                stat = "Critique";
                diag = "La vidéo échoue sur l'emballage et sur le fond. L'audience ne clique pas et ne reste pas.";
                act = "Changez de concept. Celui-ci ne résonne pas avec votre audience.";
            } else if (ctr < 4 && retention >= 38) {
                stat = "Potentiel";
                diag = "Le contenu est validé par l'audience, mais la miniature bloque la croissance (CTR trop faible).";
                act = "Refaites 3 miniatures différentes et changez celle actuelle immédiatement.";
            } else if (ctr >= 6 && retention < 30) {
                stat = "Clickbait";
                diag = "Votre miniature attire, mais l'introduction déçoit les spectateurs qui partent vite.";
                act = "Coupez vos introductions. Allez à l'essentiel en moins de 10 secondes.";
            } else if (retention >= 50 && ctr >= 6) {
                stat = "Viral";
                diag = "Signaux d'élite. La vidéo possède tous les ingrédients pour une explosion organique.";
                act = "Analysez ce succès et reproduisez la structure exacte sur la prochaine vidéo.";
            } else {
                stat = "Stable";
                diag = "Performances équilibrées. La vidéo aura une croissance saine et régulière.";
                act = "Travaillez le dynamisme du montage pour augmenter la rétention de 5%.";
            }

            document.getElementById('resStatus').innerText = stat;
            document.getElementById('resDiagnostic').innerText = diag;
            document.getElementById('resAction').innerText = act;
        }
    </script>
</body>
</html>
